services:
  postgres:
    image: postgres:16
    container_name: smart-lms-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: smart_lms_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: newpassword
    ports:
      - "5432:5432"
    volumes:
      - smart_lms_pgdata:/var/lib/postgresql/data

volumes:
  smart_lms_pgdata:

